<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POS SIMPLE</title>

<style>
body {
  font-family: system-ui;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #111;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

button {
  padding: 8px;
  width: 100%;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  background: #111;
  color: white;
}

.cart {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 15px;
  border-radius: 15px 15px 0 0;
  display: none;
  max-height: 60vh;
  overflow: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.pay {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: green;
}
</style>
</head>

<body>

<header>
  <div>POS</div>
  <div>Total: $<span id="total">0</span></div>
</header>

<div class="container" id="productos"></div>

<div class="cart" onclick="openCart()">🛒</div>

<div class="modal" id="modal">
  <h3>Carrito</h3>
  <div id="items"></div>

  <button class="pay" onclick="pagar()">PAGAR EFECTIVO</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycby3XE-7RsP_0VJXPkZsEoll3QEexrd5HldRpRmO2K80Zcbfw4Jf92eFrSinr55MyjWsHg/exec";

let productos = [];
let carrito = [];

/* ------------------ CARGAR PRODUCTOS ------------------ */
function cargarProductos() {
  fetch(API + "?action=productos")
    .then(r => r.json())
    .then(data => {
      productos = data;
      renderProductos();
    })
    .catch(err => console.log(err));
}

/* ------------------ RENDER PRODUCTOS ------------------ */
function renderProductos() {
  const cont = document.getElementById("productos");
  cont.innerHTML = "";

  productos.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${p.nombre}</strong>
      <p>$${p.precio}</p>
      <button onclick="add(${p.id})">Agregar</button>
    `;

    cont.appendChild(div);
  });
}

/* ------------------ AGREGAR AL CARRITO ------------------ */
function add(id) {
  const prod = productos.find(p => p.id === id);

  let item = carrito.find(i => i.id === id);

  if (item) item.cantidad++;
  else carrito.push({
    id: prod.id,
    nombre: prod.nombre,
    precio: prod.precio,
    cantidad: 1
  });

  updateTotal();
}

/* ------------------ TOTAL ------------------ */
function updateTotal() {
  let total = carrito.reduce((sum, i) =>
    sum + i.precio * i.cantidad, 0
  );

  document.getElementById("total").innerText = total;
}

/* ------------------ MODAL ------------------ */
function openCart() {
  document.getElementById("modal").style.display = "block";
  renderCart();
}

function renderCart() {
  const cont = document.getElementById("items");
  cont.innerHTML = "";

  carrito.forEach(i => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${i.nombre} x${i.cantidad}
      <span>$${i.precio * i.cantidad}</span>
    `;

    cont.appendChild(div);
  });
}

/* ------------------ PAGAR ------------------ */
function pagar() {
  const venta = {
    metodo: "efectivo",
    items: carrito.map(i => ({
      nombre: i.nombre,
      cantidad: i.cantidad,
      precio: i.precio,
      total: i.precio * i.cantidad
    }))
  };

  const url = API +
    "?action=venta&data=" +
    encodeURIComponent(JSON.stringify(venta));

  fetch(url)
    .then(() => alert("Venta registrada"))
    .catch(err => alert("Error"));

  carrito = [];
  updateTotal();
  document.getElementById("modal").style.display = "none";
}

/* ------------------ INIT ------------------ */
cargarProductos();
</script>

</body>
</html>
