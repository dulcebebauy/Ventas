<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POS SIMPLE</title>

<style>
body {
  font-family: system-ui;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #111;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

button {
  padding: 8px;
  width: 100%;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
  background: #111;
  color: white;
}

.cart {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 15px;
  border-radius: 50%;
  cursor: pointer;
}

.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 15px;
  border-radius: 15px 15px 0 0;
  display: none;
  max-height: 60vh;
  overflow: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

.pay {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: green;
}

  .cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.cart-left {
  flex: 1;
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
}

.cart-left strong {
  font-size: 14px;
}

.qty {
  background: #eee;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 12px;
}

.cart-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-small {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: none;
  background: #111;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.btn-small:active {
  transform: scale(0.95);
}

.price {
  margin-left: 8px;
  font-weight: bold;
}
#modal {
  transition: transform 0.2s ease;
}

#modal.hidden {
  transform: translateY(100%);
}
.cart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.min-btn {
  margin-left: auto;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  border: none;
  background: #666;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.min-btn:active {
  transform: scale(0.95);
}

.min-btn:hover {
  background: #444;
}
.discount-section {
  margin: 10px 0;
  padding: 10px;
  background: #fafafa;
  border: 1px solid #eee;
  border-radius: 10px;
}

.discount-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  gap: 10px;
}

.discount-row label {
  font-size: 12px;
  color: #444;
  width: 40%;
}

.discount-row input {
  width: 60%;
  padding: 6px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
}

.discount-row input:focus {
  border-color: #111;
}
</style>
</head>

<body>

<header>
  <div>POS</div>
  <div>Total: $<span id="total">0</span></div>
</header>

<div class="container" id="productos"></div>

<div class="cart" onclick="openCart()">🛒</div>

<div class="modal" id="modal">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div class="cart-header">
      <h3>Carrito</h3>
    
      <button class="min-btn" onclick="toggleCart()"></button>
    </div>
      ─
    </button>
  </div>

  <div id="items"></div>

  <hr>

  <h3>Total: $<span id="cartTotal">0</span></h3>

  <div class="discount-section">

    <div class="discount-row">
      <label>Descuento</label>
      <input type="number" id="discount" value="0" oninput="updateCartTotal()" />
    </div>
  
    <div class="discount-row">
      <label>Descripción</label>
      <input type="text" id="discountDesc" placeholder="Motivo del descuento" />
    </div>

  </div>
  
  <button class="pay" onclick="pagar()">PAGAR EFECTIVO</button>
</div>
<script>
const API = "https://script.google.com/macros/s/AKfycby3XE-7RsP_0VJXPkZsEoll3QEexrd5HldRpRmO2K80Zcbfw4Jf92eFrSinr55MyjWsHg/exec";

let productos = [];
let carrito = [];
let cartOpen = false;

/* ------------------ CARGAR PRODUCTOS ------------------ */
function cargarProductos() {
  fetch(API + "?action=productos")
    .then(r => r.json())
    .then(data => {
      productos = data;
      renderProductos();
    })
    .catch(err => console.log(err));
}

/* ------------------ RENDER PRODUCTOS ------------------ */
function renderProductos() {
  const cont = document.getElementById("productos");
  cont.innerHTML = "";

  productos.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${p.nombre}</strong>
      <p>$${p.precio}</p>
      <button onclick="add('${p.id}')">Agregar</button>
    `;

    cont.appendChild(div);
  });
}

/* ------------------ AGREGAR AL CARRITO ------------------ */
function add(id) {
  const prod = productos.find(p => String(p.id) === String(id));

  let item = carrito.find(i => i.id === id);

  if (item) item.cantidad++;
  else carrito.push({
    id: prod.id,
    nombre: prod.nombre,
    precio: prod.precio,
    cantidad: 1
  });

  updateTotal();

  // 🔥 NUEVO: si el modal está abierto, actualizar vista
  const modal = document.getElementById("modal");
  if (modal.style.display === "block") {
    renderCart();
  }
}

/* ------------------ TOTAL ------------------ */
function updateTotal() {
  let total = carrito.reduce((sum, i) =>
    sum + i.precio * i.cantidad, 0
  );

  document.getElementById("total").innerText = total;

  // 🔥 también actualizar carrito
  updateCartTotal();
}

/* ------------------ MODAL ------------------ */
function openCart() {
  cartOpen = true;
  document.getElementById("modal").style.display = "block";
  renderCart();
  updateCartTotal(); // 🔥 clave
}

function renderCart() {
  const cont = document.getElementById("items");
  cont.innerHTML = "";

  carrito.forEach((i, index) => {
    const div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      <div class="cart-left" onclick="removeItem(${index})">
        <strong>${i.nombre}</strong>
        <span class="qty">x${i.cantidad}</span>
      </div>

      <div class="cart-right">
        <button class="btn-small" onclick="changeQty(${index}, -1)">−</button>
        <button class="btn-small" onclick="changeQty(${index}, 1)">+</button>
        <span class="price">$${i.precio * i.cantidad}</span>
      </div>
    `;

    cont.appendChild(div);
  });

  updateCartTotal();
}
/* ------  MINIMIZAR CARRO -------*/
function toggleCart() {
  const modal = document.getElementById("modal");

  cartOpen = !cartOpen;

  if (cartOpen) {
    modal.style.display = "block";
    renderCart();
  } else {
    modal.style.display = "none";
  }
}
/* ------------------ PAGAR ------------------ */
function pagar() {
  const discount = parseFloat(document.getElementById("discount").value) || 0;
  const discountDesc = document.getElementById("discountDesc").value || "";

  const venta = {
    metodo: "efectivo",
    descuento: discount,
    descripcionDescuento: discountDesc,
    items: carrito.map(i => ({
      nombre: i.nombre,
      cantidad: i.cantidad,
      precio: i.precio,
      total: i.precio * i.cantidad
    }))
  };

  const url = API +
    "?action=venta&data=" +
    encodeURIComponent(JSON.stringify(venta));

  fetch(url)
    .then(() => alert("Venta registrada"))
    .catch(() => alert("Error"));

  carrito = [];
  updateTotal();
  document.getElementById("modal").style.display = "none";

  document.getElementById("discount").value = 0;
  document.getElementById("discountDesc").value = "";
}
/*
function updateCartTotal() {
  let total = carrito.reduce((sum, i) =>
    sum + i.precio * i.cantidad, 0
  );

  let discountEl = document.getElementById("discount");
  let discount = 0;

  if (discountEl) {
    discount = parseFloat(discountEl.value) || 0;
  }

  let finalTotal = total - discount;
  if (finalTotal < 0) finalTotal = 0;

  const el = document.getElementById("cartTotal");
  if (el) el.innerText = finalTotal;
}
*/
function updateCartTotal() {
  let subtotal = carrito.reduce((sum, i) =>
    sum + i.precio * i.cantidad, 0
  );

  const discountEl = document.getElementById("discount");
  const descEl = document.getElementById("discountDesc");

  let discount = discountEl ? parseFloat(discountEl.value) || 0 : 0;
  let desc = descEl ? descEl.value : "";

  let total = subtotal - discount;
  if (total < 0) total = 0;

  document.getElementById("cartTotal").innerText = total;

  // 🔥 opcional: guardar estado visual (debug útil)
  window.currentDiscount = discount;
  window.currentDiscountDesc = desc;
}
/* ------------------ CONTROL CANTIDADES ------------- */
function changeQty(index, value) {
  carrito[index].cantidad += value;

  if (carrito[index].cantidad <= 0) {
    carrito.splice(index, 1);
  }

  updateTotal();
  renderCart();
}

function removeItem(index) {
  carrito.splice(index, 1);

  updateTotal();
  renderCart();
}
/* ------------------ INIT ------------------ */
cargarProductos();
</script>

</body>
</html>
