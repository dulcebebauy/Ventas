<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS PRO+</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #f2f2f2;
}

/* HEADER */
.header {
  background: #111;
  color: white;
  padding: 12px;
  font-size: 20px;
  display: flex;
  justify-content: space-between;
}

/* GRID */
.productos {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.producto {
  background: white;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  transition: 0.2s;
}

.producto:active {
  transform: scale(0.95);
}

/* CARRITO FLOAT */
.carrito-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  color: white;
  padding: 15px;
  border-radius: 50%;
}

/* MODAL */
.modal {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 15px;
  display: none;
}

/* ITEMS */
.item {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

/* BOTONES */
.btn {
  padding: 12px;
  margin-top: 5px;
  border: none;
  width: 100%;
  border-radius: 8px;
}

.efectivo { background: #4caf50; color: white; }
.debito { background: #2196f3; color: white; }
</style>
</head>

<body>

<div class="header">
  <span>POS</span>
  <span>$<span id="total">0</span></span>
</div>

<div class="productos" id="productos"></div>

<div class="carrito-btn" onclick="abrirModal()">🛒</div>

<div class="modal" id="modal">
  <h3>Carrito</h3>
  <div id="items"></div>

  <button class="btn efectivo" onclick="pagar('efectivo')">Efectivo</button>
  <button class="btn debito" onclick="pagar('debito')">Débito</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzE16UNnbFuj1x4SBRAvBc4zvePCtvGNvZ4ydinY--JfP94Yb38Uso6F-PbgtGn_Uo/exec";//"https://script.google.com/macros/s/AKfycbyKRCDAO0DTctyx0mRbRm1-0tpg6HIspty9QDzqDtImqsm4_R4coLfaYaiirPO-jRfClA/exec";
let productos = [];
let carrito = [];

// OFFLINE STORAGE
function guardarOffline(data) {
  let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
  ventas.push(data);
  localStorage.setItem("ventas", JSON.stringify(ventas));
}

// SYNC
async function sincronizar() {
  let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

  for (let v of ventas) {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(v)
    });
  }

  localStorage.removeItem("ventas");
}

// CARGAR PRODUCTOS
async function cargar() {
  const res = await fetch(`${API_URL}?action=productos`);
  productos = await res.json();

  render();
  sincronizar();
}

// RENDER
function render() {
  const cont = document.getElementById("productos");

  productos.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";

    div.innerHTML = `
      <strong>${p.nombre}</strong>
      <br>$${p.precio}
    `;

    div.onclick = () => agregar(p);

    cont.appendChild(div);
  });
}

// AGREGAR
function agregar(p) {
  const item = carrito.find(i => i.id === p.id);

  if (item) item.cantidad++;
  else carrito.push({ ...p, cantidad: 1 });

  actualizarTotal();
}

// TOTAL
function actualizarTotal() {
  let total = carrito.reduce((sum, i) => sum + i.precio * i.cantidad, 0);
  document.getElementById("total").innerText = total;
}

// MODAL
function abrirModal() {
  document.getElementById("modal").style.display = "block";
  renderItems();
}

function renderItems() {
  const cont = document.getElementById("items");
  cont.innerHTML = "";

  carrito.forEach(i => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `${i.nombre} x${i.cantidad} <span>$${i.precio * i.cantidad}</span>`;
    cont.appendChild(div);
  });
}

// PAGAR
async function pagar(metodo) {
  const venta = {
    metodo,
    items: carrito.map(i => ({
      nombre: i.nombre,
      cantidad: i.cantidad,
      precio: i.precio,
      total: i.precio * i.cantidad
    }))
  };

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(venta)
    });
  } catch {
    guardarOffline(venta);
  }

  carrito = [];
  actualizarTotal();
  document.getElementById("modal").style.display = "none";

  alert("Venta guardada");
}

cargar();
</script>

</body>
</html>
